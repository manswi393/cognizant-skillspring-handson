<h2>Course List</h2>

<a routerLink="/courses/add">Add Course</a>

<ul>
  <li *ngFor="let course of courses">
    <b>{{ course.name }}</b> - {{ course.duration }}

    <button (click)="viewCourse(course.id)">View</button>
    <button (click)="editCourse(course.id)">Edit</button>
    <button (click)="deleteCourse(course.id)">Delete</button>
  </li>
</ul>
